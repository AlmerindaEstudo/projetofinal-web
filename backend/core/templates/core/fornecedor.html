{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Fornecedor</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'core/base.css' %}" />
  <link rel="stylesheet" href="{% static 'core/fornecedor.css' %}">

</head>

<body>
 
  <aside class="sidebar">
    <div class="logo">
      <svg
        class="logo-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#2f6335"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>

      <h1>CONTROLE ESTOQUE</h1>
    </div>

    <nav class="menu">

      <a href="/fornecedor/" class="menu-item">
        <!-- icone -->
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24" stroke="#2f6335" stroke-width="2">
          <path d="M3 4h18v16H3z"/>
        </svg>
        Cadastrar Produto
      </a>

      <a href="/estoque/" class="menu-item">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24" stroke="#2f6335" stroke-width="2">
          <rect x="3" y="7" width="18" height="10"/>
        </svg>
        Vendidos
      </a>

      <a href="/vender/" class="menu-item">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24" stroke="#2f6335" stroke-width="2">
          <rect x="3" y="6" width="18" height="12"/>
        </svg>
        Vender
      </a>

      <a href="/comprar/" class="menu-item">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24" stroke="#2f6335" stroke-width="2">
          <rect x="4" y="7" width="16" height="10"/>
        </svg>
        Comprar Produtos
      </a>

    </nav>
  </aside>


  <main class="main-content">
    <h2>Cadastro de Fornecedor</h2>

    <form class="form" id="formFornecedor">

      <!-- DADOS DO FORNECEDOR -->
      <h3>Dados do Fornecedor</h3>

      <div class="grid">
        <input id="nome" type="text" placeholder="Nome do fornecedor" required>
        <input id="cnpj" type="text" placeholder="CNPJ" required>
        <input id="telefone" type="text" placeholder="Telefone">
        <input id="email" type="email" placeholder="Email">
        <input id="endereco" type="text" placeholder="Endereço">
      </div>

      <!-- PRODUTO DO FORNECEDOR -->
      <h3>Produto fornecido</h3>

      <div class="grid">

  <div class="input-group">
    <label>Nome do produto</label>
    <input id="produto_nome" type="text" placeholder="Digite o produto" required>
  </div>

  <div class="input-group">
    <label>Quantidade disponível</label>
    <input id="quantidade" type="number" placeholder="Quantidade" required>
  </div>

  <div class="input-group">
    <label>Data de validade</label>
    <input id="validade" type="date">
  </div>

  <div class="input-group">
    <label>Preço de compra</label>
    <input id="preco" type="number" step="0.01" placeholder="R$ 0,00" required>
  </div>

  <div class="input-group">
    <label>Previsão de entrega</label>
    <input id="previsao" type="date">
  </div>

</div>

      <button type="submit" class="btn-primary">Salvar</button>
    </form>
  </main>

  <!-- SCRIPT DE INTEGRAÇÃO -->
  <script>
document.getElementById("formFornecedor").addEventListener("submit", async function(e) {
  e.preventDefault();

  try {
    // 🏢 1. SALVAR FORNECEDOR
    const fornecedor = {
      nome: document.getElementById("nome").value,
      cnpj: document.getElementById("cnpj").value,
      telefone: document.getElementById("telefone").value,
      email: document.getElementById("email").value,
      endereco: document.getElementById("endereco").value
    };

    const resFornecedor = await fetch("/api/fornecedores/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(fornecedor)
    });

    const fornecedorCriado = await resFornecedor.json();

    // 🔥 PEGA O ID DO FORNECEDOR
    const fornecedorId = fornecedorCriado.id;

    // 📦 2. SALVAR PRODUTO DO FORNECEDOR
    const produtoFornecedor = {
    fornecedor: fornecedorId,
    nome_produto: document.getElementById("produto_nome").value,
    quantidade_disponivel: document.getElementById("quantidade").value,
    validade: document.getElementById("validade").value,
    preco_compra: document.getElementById("preco").value,
    previsao_entrega: document.getElementById("previsao").value
           };

    await fetch("/api/produtos-fornecedor/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(produtoFornecedor)
    });

    alert("Fornecedor e produto cadastrados com sucesso!");

    document.getElementById("formFornecedor").reset();

  } catch (error) {
    console.error("Erro:", error);
    alert("Erro ao cadastrar");
  }
});
</script>
</body>
</html>
