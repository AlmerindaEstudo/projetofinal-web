{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Estoque - Controle Estoque</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'core/estoque.css' %}" />
  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'core/base.css' %}" />

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab&display=swap" rel="stylesheet"/>
</head>

<body>

  <aside class="sidebar">
    <div class="logo">
      <svg
        class="logo-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#2f6335"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>

      <h1>CONTROLE ESTOQUE</h1>
    </div>

    <nav class="menu">

      <a href="/fornecedor/" class="menu-item">
        <!-- icone -->
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24" stroke="#2f6335" stroke-width="2">
          <path d="M3 4h18v16H3z"/>
        </svg>
        Cadastrar Produto
      </a>

      <a href="/estoque/" class="menu-item">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24" stroke="#2f6335" stroke-width="2">
          <rect x="3" y="7" width="18" height="10"/>
        </svg>
        Vendidos
      </a>

      <a href="/vender/" class="menu-item">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24" stroke="#2f6335" stroke-width="2">
          <rect x="3" y="6" width="18" height="12"/>
        </svg>
        Vender
      </a>

      <a href="/comprar/" class="menu-item">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24" stroke="#2f6335" stroke-width="2">
          <rect x="4" y="7" width="16" height="10"/>
        </svg>
        Comprar Produtos
      </a>

    </nav>
  </aside>

  <!-- CONTEÚDO -->
  <main class="main-content">

    <h2>Histórico de Vendas</h2>

<table class="estoque-table">
  <thead>
    <tr>
      <th>Cliente</th>
      <th>Telefone</th>
      <th>Produto</th>
      <th>Quantidade</th>
      <th>Preço Unitário</th>
      <th>Total</th>
      <th>Data</th>
    </tr>
  </thead>

  <tbody id="tabelaVendas"></tbody>
</table>

      <tbody id="tabelaVendas">
        <!-- preenchido via JS -->
      </tbody>

    </table>

  </main>

<script>
function formatarData(dataISO) {
  const data = new Date(dataISO);

  const dia = String(data.getDate()).padStart(2, '0');
  const mes = String(data.getMonth() + 1).padStart(2, '0');
  const ano = data.getFullYear();

  const horas = String(data.getHours()).padStart(2, '0');
  const minutos = String(data.getMinutes()).padStart(2, '0');

  return `${dia}/${mes}/${ano} ${horas}:${minutos}`;
}

fetch("/api/vendidos/")
.then(res => res.json())
.then(data => {

  console.log("VENDAS:", data);

  const tabela = document.getElementById("tabelaVendas");
  tabela.innerHTML = "";

  if (data.length === 0) {
    tabela.innerHTML = `
      <tr>
        <td colspan="7">Nenhuma venda registrada</td>
      </tr>
    `;
    return;
  }

  data.forEach(v => {

    const total = (v.quantidade * v.produto_preco).toFixed(2);

    const linha = `
      <tr>
        <td>${v.cliente_nome}</td>
        <td>${v.cliente_telefone}</td>
        <td>${v.produto_nome}</td>
        <td>${v.quantidade}</td>
        <td>R$ ${v.produto_preco}</td>
        <td>R$ ${total}</td>
        <td>${formatarData(v.data)}</td>
      </tr>
    `;

    tabela.innerHTML += linha;
  });

})
.catch(error => {
  console.error("Erro ao carregar vendas:", error);
});
</script>

</body>
</html>
