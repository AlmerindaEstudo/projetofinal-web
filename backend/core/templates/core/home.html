{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Controle Estoque{% endblock %}</title>

  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'core/base.css' %}" />

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab&display=swap" rel="stylesheet"/>
</head>

<body>

  <aside class="sidebar">
    <div class="logo">
      <svg
        class="logo-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#2f6335"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>

      <h1>CONTROLE ESTOQUE</h1>
    </div>

    <nav class="menu">

  <a href="{% url 'fornecedor' %}" class="menu-item">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none"
      viewBox="0 0 24 24" stroke="#2f6335" stroke-width="2">
      <path d="M3 4h18v16H3z"/>
    </svg>
    Cadastrar Produto
  </a>

  <a href="{% url 'estoque' %}" class="menu-item">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none"
      viewBox="0 0 24 24" stroke="#2f6335" stroke-width="2">
      <rect x="3" y="7" width="18" height="10"/>
    </svg>
    Vendidos
  </a>

  <a href="{% url 'vender' %}" class="menu-item">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none"
      viewBox="0 0 24 24" stroke="#2f6335" stroke-width="2">
      <rect x="3" y="6" width="18" height="12"/>
    </svg>
    Vender
  </a>

  <a href="{% url 'comprar' %}" class="menu-item">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none"
      viewBox="0 0 24 24" stroke="#2f6335" stroke-width="2">
      <rect x="4" y="7" width="16" height="10"/>
    </svg>
    Comprar Produtos
  </a>

</nav>
  </aside>

  <!-- CONTEÚDO DAS PÁGINAS -->
  <main class="main-content">
    {% block content %}
    {% endblock %}
  </main>

</body>
</html>
